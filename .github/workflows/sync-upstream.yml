name: Sync upstream every 6 hours and build Docker

on:
  schedule:
    # 每 6 小时整点跑一次
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  # TODO: change to your Docker Hub repo/name, e.g. "yourname/qq-farm-bot-ui"
  IMAGE_NAME: ldqs365/qq-farm-bot-ui

# 避免上一次还没跑完又开始下一次
concurrency:
  group: sync-upstream
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync-fork:
    name: Check upstream and sync fork
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.sync.outputs.updated }}
      branch: ${{ steps.sync.outputs.branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect upstream and sync if needed
        id: sync
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          repo="$GITHUB_REPOSITORY"

          # 读取 fork 的上游仓库信息（如果不是 fork，就直接退出）
          parent_full="$(gh api "repos/$repo" --jq '.parent.full_name // empty')"
          if [ -z "$parent_full" ]; then
            echo "This repository is not a fork; skip sync."
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "branch=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          branch="$(gh api "repos/$repo" --jq '.default_branch')"
          fork_owner="${repo%%/*}"
          upstream_owner="${parent_full%%/*}"

          echo "Upstream: $parent_full"
          echo "Branch: $branch"

          # 对比 fork 分支与 upstream(父仓库) 分支：
          # 需要同步的条件：fork 落后于 upstream，即 behind_by > 0
          # compare 的方向必须是：base=upstream, head=fork
          # 这样 behind_by 表示 fork 还差上游多少提交
          compare_url="repos/$parent_full/compare/$upstream_owner:$branch...$fork_owner:$branch"
          status="$(gh api "$compare_url" --jq '.status')"
          ahead_by="$(gh api "$compare_url" --jq '.ahead_by')"
          behind_by="$(gh api "$compare_url" --jq '.behind_by')"

          echo "compare status=$status ahead_by=$ahead_by behind_by=$behind_by"

          if [ "$behind_by" -eq 0 ]; then
            echo "No upstream updates; skip."
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "branch=$branch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Upstream updated; syncing fork..."

          # 使用 GitHub 官方 merge-upstream API 同步 fork
          # https://docs.github.com/en/rest/branches/branches#merge-upstream
          gh api -X POST "repos/$repo/merge-upstream" -f branch="$branch" >/dev/null

          echo "updated=true" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

  prepare-tags:
    name: Prepare shared tags
    runs-on: ubuntu-latest
    needs: sync-fork
    if: needs.sync-fork.outputs.updated == 'true'
    outputs:
      release_date: ${{ steps.tag.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync-fork.outputs.branch }}

      - name: Read release date tag from Update.log first line
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          date_tag=""

          if [ -f Update.log ]; then
            first_line="$(sed -n '1p' Update.log | tr -d '\r')"
            date_raw="$(echo "$first_line" | grep -oE '[0-9]{4}/[0-9]{2}/[0-9]{2}' | head -n 1 || true)"
            if [ -n "$date_raw" ]; then
              # Docker tags cannot contain '/'; convert to YYYY-MM-DD.
              date_tag="${date_raw//\//-}"
            fi
          fi

          # Fallback 1: use latest commit date on this branch (UTC)
          if [ -z "$date_tag" ]; then
            date_tag="$(git log -1 --date=format:%Y-%m-%d --format=%cd 2>/dev/null || true)"
          fi

          # Fallback 2: use today's date (UTC)
          if [ -z "$date_tag" ]; then
            date_tag="$(date -u +%Y-%m-%d)"
          fi

          echo "value=$date_tag" >> "$GITHUB_OUTPUT"

  docker-amd64:
    name: Build Docker linux/amd64
    runs-on: ubuntu-latest
    needs:
      - sync-fork
      - prepare-tags
    if: needs.prepare-tags.result == 'success'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync-fork.outputs.branch }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./core/Dockerfile
          platforms: linux/amd64
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export amd64 digest
        shell: bash
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" | sed 's/^sha256://' > /tmp/digests/amd64

      - name: Upload amd64 digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-amd64
          path: /tmp/digests/amd64
          if-no-files-found: error
          retention-days: 1

  docker-arm64:
    name: Build Docker linux/arm64
    runs-on: ubuntu-24.04-arm
    needs:
      - sync-fork
      - prepare-tags
    if: needs.prepare-tags.result == 'success'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync-fork.outputs.branch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./core/Dockerfile
          platforms: linux/arm64
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export arm64 digest
        shell: bash
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" | sed 's/^sha256://' > /tmp/digests/arm64

      - name: Upload arm64 digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-arm64
          path: /tmp/digests/arm64
          if-no-files-found: error
          retention-days: 1

  docker-armv7:
    name: Build Docker linux/arm/v7
    runs-on: ubuntu-latest
    needs:
      - sync-fork
      - prepare-tags
    if: needs.prepare-tags.result == 'success'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync-fork.outputs.branch }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./core/Dockerfile
          platforms: linux/arm/v7
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export armv7 digest
        shell: bash
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" | sed 's/^sha256://' > /tmp/digests/armv7

      - name: Upload armv7 digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-armv7
          path: /tmp/digests/armv7
          if-no-files-found: error
          retention-days: 1

  publish-manifests:
    name: Publish Docker manifests (Linux)
    runs-on: ubuntu-latest
    needs:
      - prepare-tags
      - docker-amd64
      - docker-arm64
      - docker-armv7
    if: needs.prepare-tags.result == 'success'
    permissions:
      contents: read
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Publish latest and release-date manifests from digests
        shell: bash
        run: |
          set -euo pipefail

          sources=""
          for f in /tmp/digests/*; do
            d="sha256:$(cat "$f")"
            sources="$sources ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@$d"
          done

          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare-tags.outputs.release_date }} \
            $sources

      - name: Inspect latest manifest
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Inspect release-date manifest
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare-tags.outputs.release_date }}
